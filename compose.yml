name: realtime-fleet-data-engine

services:
  # Ingestion Buffer: Apache Kafka Broker (KRaft Mode)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    networks:
      - fleet-telemetry-net
    ports:
      - "${KAFKA_PORT}:9092"
      - "${KAFKA_HOST_PORT}:29092"
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: '${KAFKA_CLUSTER_ID}'
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M

  # Low-Latency Caching & Serving Layer: Redis
  redis:
    image: redis:7.2-alpine
    container_name: redis
    networks:
      - fleet-telemetry-net
    ports:
      - "${REDIS_PORT}:6379"
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "env REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep PONG || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # Streaming Core Engine: Flink JobManager (Master)
  flink-jobmanager:
    build:
      context: .
      dockerfile: docker/Dockerfile.flink
    image: pyflink:2.3.0-scala_2.12
    container_name: flink-jobmanager
    networks:
      - fleet-telemetry-net
    ports:
      - "${FLINK_JOBMANAGER_PORT}:8081"
    restart: unless-stopped
    volumes:
      - ./src/pipeline.py:/opt/flink/usrlib/pipeline.py:ro
      - ./lib/flink-sql-connector-kafka-5.0.0-2.2.jar:/opt/flink/lib/flink-sql-connector-kafka-5.0.0-2.2.jar:ro
      - ./config/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
    command: jobmanager
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - DLQ_S3_BUCKET=${DLQ_S3_BUCKET}
      - PSEUDONYMIZE_PII=${PSEUDONYMIZE_PII}
      - PII_SALT=${PII_SALT}
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: ${FLINK_JOBMANAGER_RPC_ADDRESS}
        jobmanager.memory.process.size: ${FLINK_JOBMANAGER_MEM_SIZE}
        state.backend: rocksdb
        state.checkpoints.dir: s3://${DLQ_S3_BUCKET}/checkpoints
        state.savepoints.dir: s3://${DLQ_S3_BUCKET}/savepoints
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: ${AWS_ACCESS_KEY_ID}
        s3.secret-key: ${AWS_SECRET_ACCESS_KEY}
        restart-strategy: fixed-delay
        restart-strategy.fixed-delay.attempts: 3
        restart-strategy.fixed-delay.delay: 10 s
    healthcheck:
      test: ["CMD-SHELL", "/bin/bash -c 'echo > /dev/tcp/localhost/8081' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M

  # Streaming Core Engine: Flink TaskManager (Worker)
  flink-taskmanager:
    build:
      context: .
      dockerfile: docker/Dockerfile.flink
    image: pyflink:2.3.0-scala_2.12
    container_name: flink-taskmanager
    networks:
      - fleet-telemetry-net
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./src/pipeline.py:/opt/flink/usrlib/pipeline.py:ro
      - ./lib/flink-sql-connector-kafka-5.0.0-2.2.jar:/opt/flink/lib/flink-sql-connector-kafka-5.0.0-2.2.jar:ro
      - ./config/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
    command: taskmanager
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - DLQ_S3_BUCKET=${DLQ_S3_BUCKET}
      - PSEUDONYMIZE_PII=${PSEUDONYMIZE_PII}
      - PII_SALT=${PII_SALT}
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: ${FLINK_JOBMANAGER_RPC_ADDRESS}
        taskmanager.numberOfTaskSlots: ${FLINK_TASK_SLOTS}
        taskmanager.memory.process.size: ${FLINK_TASKMANAGER_MEM_SIZE}
        taskmanager.memory.framework.heap.size: ${FLINK_TASKMANAGER_HEAP_FRAMEWORK}
        taskmanager.memory.task.heap.size: ${FLINK_TASKMANAGER_HEAP_TASK}
        taskmanager.memory.managed.size: ${FLINK_TASKMANAGER_MANAGED}
        state.backend: rocksdb
        state.checkpoints.dir: s3://${DLQ_S3_BUCKET}/checkpoints
        state.savepoints.dir: s3://${DLQ_S3_BUCKET}/savepoints
        s3.endpoint: http://minio:9000
        s3.path.style.access: true
        s3.access-key: ${AWS_ACCESS_KEY_ID}
        s3.secret-key: ${AWS_SECRET_ACCESS_KEY}
        restart-strategy: fixed-delay
        restart-strategy.fixed-delay.attempts: 3
        restart-strategy.fixed-delay.delay: 10 s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3072M

  # Synthetic Data Ingestion Simulator: Telemetry Generator
  telemetry-generator:
    build:
      context: .
      dockerfile: docker/Dockerfile.generator
    container_name: telemetry-generator
    networks:
      - fleet-telemetry-net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    command: [
      "--rate", "${TELEMETRY_GENERATOR_RATE}",
      "--vehicles", "${TELEMETRY_GENERATOR_VEHICLES}",
      "--late-pct", "${TELEMETRY_GENERATOR_LATE_PCT}",
      "--max-delay-sec", "${TELEMETRY_GENERATOR_MAX_DELAY_SEC}"
    ]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Local S3 Object Storage Emulator: MinIO
  minio:
    image: minio/minio:latest
    container_name: minio
    networks:
      - fleet-telemetry-net
    ports:
      - "${MINIO_PORT_HOST:-9000}:9000"
      - "${MINIO_CONSOLE_PORT_HOST:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # MinIO Bucket Auto-Provisioning Helper
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    networks:
      - fleet-telemetry-net
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DLQ_S3_BUCKET=${DLQ_S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set localminio http://minio:9000 $${AWS_ACCESS_KEY_ID} $${AWS_SECRET_ACCESS_KEY};
      mc mb --ignore-existing localminio/$${DLQ_S3_BUCKET};
      exit 0;
      "
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

networks:
  fleet-telemetry-net:
    name: fleet-telemetry-net
    driver: bridge
